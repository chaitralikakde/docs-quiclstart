  <rect x="395" y="120" width="170" height="42" rx="8" fill="#18181b" style="fill:rgb(24, 24, 27);stroke:none;color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:system-ui, -apple-system, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>
  <text x="480" y="138" text-anchor="middle" font-size="12" font-weight="700" fill="#fff" style="fill:rgb(255, 255, 255);stroke:none;color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:system-ui, -apple-system, sans-serif;font-size:12px;font-weight:700;text-anchor:middle;dominant-baseline:auto">Keploy</text>
  <text x="480" y="153" text-anchor="middle" font-size="11" fill="#a1a1aa" style="fill:rgb(161, 161, 170);stroke:none;color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:system-ui, -apple-system, sans-serif;font-size:11px;font-weight:400;text-anchor:middle;dominant-baseline:auto">replays the calls</text>

  <line x1="480" y1="162" x2="480" y2="190" stroke="#71717a" stroke-width="1.5" marker-end="url(#arr)" style="fill:rgb(0, 0, 0);stroke:rgb(113, 113, 122);color:rgb(255, 255, 255);stroke-width:1.5px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:system-ui, -apple-system, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>

  <!-- App test -->
  <rect x="400" y="192" width="160" height="42" rx="8" fill="var(--bg-secondary,#f4f4f5)" stroke="var(--border,#e4e4e7)" stroke-width="1.2" style="fill:rgb(244, 244, 245);stroke:rgb(228, 228, 231);color:rgb(255, 255, 255);stroke-width:1.2px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:system-ui, -apple-system, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>
  <text x="480" y="217" text-anchor="middle" font-size="12" font-weight="600" fill="var(--text-primary,#18181b)" style="fill:rgb(24, 24, 27);stroke:none;color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:system-ui, -apple-system, sans-serif;font-size:12px;font-weight:600;text-anchor:middle;dominant-baseline:auto">Your app</text>

  <line x1="480" y1="234" x2="480" y2="262" stroke="#71717a" stroke-width="1.5" marker-end="url(#arr)" style="fill:rgb(0, 0, 0);stroke:rgb(113, 113, 122);color:rgb(255, 255, 255);stroke-width:1.5px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:system-ui, -apple-system, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>

  <!-- Pass/Fail -->
  <rect x="400" y="264" width="160" height="42" rx="8" fill="var(--bg-secondary,#f4f4f5)" stroke="var(--border,#e4e4e7)" stroke-width="1.2" style="fill:rgb(244, 244, 245);stroke:rgb(228, 228, 231);color:rgb(255, 255, 255);stroke-width:1.2px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:system-ui, -apple-system, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>
  <text x="480" y="282" text-anchor="middle" font-size="12" font-weight="600" fill="var(--text-primary,#18181b)" style="fill:rgb(24, 24, 27);stroke:none;color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:system-ui, -apple-system, sans-serif;font-size:12px;font-weight:600;text-anchor:middle;dominant-baseline:auto">Pass / Fail</text>
  <text x="480" y="297" text-anchor="middle" font-size="11" fill="var(--text-secondary,#71717a)" style="fill:rgb(113, 113, 122);stroke:none;color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:system-ui, -apple-system, sans-serif;font-size:11px;font-weight:400;text-anchor:middle;dominant-baseline:auto">response matched?</text>

</svg>