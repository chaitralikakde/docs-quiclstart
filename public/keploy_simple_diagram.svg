  <line x1="320" y1="15" x2="320" y2="405" stroke="var(--border,#e4e4e7)" stroke-width="1" stroke-dasharray="6 4" style="fill:rgb(0, 0, 0);stroke:rgb(228, 228, 231);color:rgb(255, 255, 255);stroke-width:1px;stroke-dasharray:6px, 4px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:system-ui, -apple-system, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>

