  <path d="M 75 141 C 30 141 30 310 72 316" stroke="#16a34a" stroke-width="1.5" fill="none" stroke-dasharray="5 3" marker-end="url(#arr-g)" style="fill:none;stroke:rgb(22, 163, 74);color:rgb(255, 255, 255);stroke-width:1.5px;stroke-dasharray:5px, 3px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:system-ui, -apple-system, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>

  <rect x="34" y="310" width="250" height="42" rx="8" fill="#f0fdf4" stroke="#86efac" stroke-width="1.2" style="fill:rgb(240, 253, 244);stroke:rgb(134, 239, 172);color:rgb(255, 255, 255);stroke-width:1.2px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:system-ui, -apple-system, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>
  <text x="159" y="328" text-anchor="middle" font-size="12" font-weight="600" fill="#15803d" style="fill:rgb(21, 128, 61);stroke:none;color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:system-ui, -apple-system, sans-serif;font-size:12px;font-weight:600;text-anchor:middle;dominant-baseline:auto">test-1.yml + mocks.yml</text>
  <text x="159" y="344" text-anchor="middle" font-size="11" fill="#16a34a" style="fill:rgb(22, 163, 74);stroke:none;color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:system-ui, -apple-system, sans-serif;font-size:11px;font-weight:400;text-anchor:middle;dominant-baseline:auto">saved automatically</text>

