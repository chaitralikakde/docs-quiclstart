<svg viewBox="0 0 650 430" xmlns="http://www.w3.org/2000/svg" role="img" font-family="system-ui, -apple-system, sans-serif" style="">
  <title style="fill:rgb(0, 0, 0);stroke:none;color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:system-ui, -apple-system, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto">How Keploy works</title>
  <defs>
    <marker id="arr" markerWidth="8" markerHeight="8" refX="7" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#71717a"/>
    </marker>
    <marker id="arr-g" markerWidth="8" markerHeight="8" refX="7" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#16a34a"/>
    </marker>
  </defs>

  <rect width="640" height="420" fill="var(--bg-primary,#fff)" rx="14" style="fill:rgb(255, 255, 255);stroke:none;color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:system-ui, -apple-system, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>

  <!-- RECORD -->
  <text x="160" y="30" text-anchor="middle" font-size="13" font-weight="700" fill="var(--text-primary,#18181b)" style="fill:rgb(24, 24, 27);stroke:none;color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:system-ui, -apple-system, sans-serif;font-size:13px;font-weight:700;text-anchor:middle;dominant-baseline:auto">Record once</text>

  <!-- Postman/curl -->
  <rect x="80" y="48" width="160" height="42" rx="8" fill="var(--bg-secondary,#f4f4f5)" stroke="var(--border,#e4e4e7)" stroke-width="1.2" style="fill:rgb(244, 244, 245);stroke:rgb(228, 228, 231);color:rgb(255, 255, 255);stroke-width:1.2px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:system-ui, -apple-system, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>
  <text x="160" y="66" text-anchor="middle" font-size="12" font-weight="600" fill="var(--text-primary,#18181b)" style="fill:rgb(24, 24, 27);stroke:none;color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:system-ui, -apple-system, sans-serif;font-size:12px;font-weight:600;text-anchor:middle;dominant-baseline:auto">Postman / curl</text>
  <text x="160" y="81" text-anchor="middle" font-size="11" fill="var(--text-secondary,#71717a)" style="fill:rgb(113, 113, 122);stroke:none;color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:system-ui, -apple-system, sans-serif;font-size:11px;font-weight:400;text-anchor:middle;dominant-baseline:auto">make API calls</text>

  <line x1="160" y1="90" x2="160" y2="118" stroke="#71717a" stroke-width="1.5" marker-end="url(#arr)" style="fill:rgb(0, 0, 0);stroke:rgb(113, 113, 122);color:rgb(255, 255, 255);stroke-width:1.5px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:system-ui, -apple-system, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>

  <!-- Keploy -->
  <rect x="75" y="120" width="170" height="42" rx="8" fill="#18181b" style="fill:rgb(24, 24, 27);stroke:none;color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:system-ui, -apple-system, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>
  <text x="160" y="138" text-anchor="middle" font-size="12" font-weight="700" fill="#fff" style="fill:rgb(255, 255, 255);stroke:none;color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:system-ui, -apple-system, sans-serif;font-size:12px;font-weight:700;text-anchor:middle;dominant-baseline:auto">Keploy</text>
  <text x="160" y="153" text-anchor="middle" font-size="11" fill="#a1a1aa" style="fill:rgb(161, 161, 170);stroke:none;color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:system-ui, -apple-system, sans-serif;font-size:11px;font-weight:400;text-anchor:middle;dominant-baseline:auto">watches all traffic</text>

  <line x1="160" y1="162" x2="160" y2="190" stroke="#71717a" stroke-width="1.5" marker-end="url(#arr)" style="fill:rgb(0, 0, 0);stroke:rgb(113, 113, 122);color:rgb(255, 255, 255);stroke-width:1.5px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:system-ui, -apple-system, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>

  <!-- App -->
  <rect x="80" y="192" width="160" height="42" rx="8" fill="var(--bg-secondary,#f4f4f5)" stroke="var(--border,#e4e4e7)" stroke-width="1.2" style="fill:rgb(244, 244, 245);stroke:rgb(228, 228, 231);color:rgb(255, 255, 255);stroke-width:1.2px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:system-ui, -apple-system, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>
  <text x="160" y="210" text-anchor="middle" font-size="12" font-weight="600" fill="var(--text-primary,#18181b)" style="fill:rgb(24, 24, 27);stroke:none;color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:system-ui, -apple-system, sans-serif;font-size:12px;font-weight:600;text-anchor:middle;dominant-baseline:auto">Your app</text>
  <text x="160" y="226" text-anchor="middle" font-size="11" fill="var(--text-secondary,#71717a)" style="fill:rgb(113, 113, 122);stroke:none;color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:system-ui, -apple-system, sans-serif;font-size:11px;font-weight:400;text-anchor:middle;dominant-baseline:auto">+ Redis</text>

